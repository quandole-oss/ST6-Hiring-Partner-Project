spring:
  application:
    name: weekly-commit

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/weeklycommit}
    username: ${SPRING_DATASOURCE_USERNAME:wcuser}
    password: ${SPRING_DATASOURCE_PASSWORD:wcpass}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 10000
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 16

  flyway:
    enabled: true
    locations: classpath:db/migration
    connect-retries: 3
    connect-retries-interval: 5

server:
  port: ${PORT:8080}

app:
  demo-mode: ${DEMO_MODE:false}
  seed-demo-data: ${SEED_DEMO_DATA:${DEMO_MODE:false}}
  jwt:
    secret: ${JWT_SECRET:a-default-dev-secret-that-is-at-least-256-bits-long-for-hs256}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}
  ai:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-6
    max-tokens: 1024
    enabled: ${AI_SUMMARIES_ENABLED:true}
    qa-max-tokens: 2048
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  lifecycle:
    timezone: UTC
    auto-lock-cron: "0 0 10 * * MON"
    carry-forward-limit: 3
  export:
    email-from: ${EXPORT_EMAIL_FROM:noreply@st6weekly.com}
