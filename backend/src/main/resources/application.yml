spring:
  application:
    name: weekly-commit

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/weeklycommit}
    username: ${SPRING_DATASOURCE_USERNAME:wcuser}
    password: ${SPRING_DATASOURCE_PASSWORD:wcpass}
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

app:
  demo-mode: ${DEMO_MODE:false}
  jwt:
    secret: ${JWT_SECRET:a-default-dev-secret-that-is-at-least-256-bits-long-for-hs256}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}
  ai:
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-5-20250514
    max-tokens: 1024
    enabled: ${AI_SUMMARIES_ENABLED:true}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  lifecycle:
    timezone: UTC
    auto-lock-cron: "0 0 10 * * MON"
    carry-forward-limit: 3
