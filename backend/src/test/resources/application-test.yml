spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  cors:
    allowed-origins: http://localhost:5173
  lifecycle:
    timezone: UTC
    auto-lock-cron: "0 0 10 * * MON"
    carry-forward-limit: 3
  ai:
    enabled: false
    anthropic-api-key: ""
    model: claude-sonnet-4-5-20250514
    max-tokens: 1024
